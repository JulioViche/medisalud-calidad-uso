name: medisalud-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [medisalud]

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${SQLSERVER_PASSWORD}
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQLSERVER_PASSWORD}' -C -Q 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks: [medisalud]

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
    entrypoint: ["/bin/bash", "/init/create-database.sh"]
    volumes:
      - ../sqlserver/init:/init:ro
    networks: [medisalud]
    restart: "no"

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ../rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [medisalud]

  measurement-api:
    build:
      context: ../..
      dockerfile: services/measurement-api/Dockerfile
    environment:
      MEDISALUD_ROOT: /workspace
    volumes:
      - ../../data/processed:/workspace/data/processed
      - ../../data/simulated:/workspace/data/simulated
      - ../../evidencias/resultados:/workspace/evidencias/resultados
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [medisalud]

  hce-service:
    build:
      context: ../..
      dockerfile: services/hce-service/Dockerfile
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      postgres: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [medisalud]

  appointments-service:
    build:
      context: ../..
      dockerfile: services/appointments-service/Dockerfile
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [medisalud]

  billing-service:
    build:
      context: ../..
      dockerfile: services/billing-service/Dockerfile
    environment:
      SQLSERVER_URL: jdbc:sqlserver://sqlserver:1433;databaseName=medisalud_finance;encrypt=false;trustServerCertificate=true
      SQLSERVER_USER: ${SQLSERVER_USER}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
    depends_on:
      sqlserver-init: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [medisalud]

  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    environment:
      MEASUREMENT_API_URL: http://measurement-api:8000
      HCE_SERVICE_URL: http://hce-service:8081
      APPOINTMENTS_SERVICE_URL: http://appointments-service:8082
      BILLING_SERVICE_URL: http://billing-service:8083
    depends_on:
      measurement-api: {condition: service_healthy}
      hce-service: {condition: service_healthy}
      appointments-service: {condition: service_healthy}
      billing-service: {condition: service_healthy}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [medisalud]

  web-his:
    build:
      context: ../..
      dockerfile: apps/web-his/Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      api-gateway: {condition: service_healthy}
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [medisalud]

networks:
  medisalud:
    driver: bridge

volumes:
  postgres-data:
  sqlserver-data:
  rabbitmq-data:
